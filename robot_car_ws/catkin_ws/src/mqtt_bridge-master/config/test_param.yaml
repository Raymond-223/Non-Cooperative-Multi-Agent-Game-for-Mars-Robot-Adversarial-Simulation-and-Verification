mqtt:
  client:
    protocol: 4      # MQTTv311
  connection:
    host: 47.110.248.80
    #host: broker.emqx.io
    port: 1883
    # port: 8083
    keepalive: 60
  private_path: device/001
serializer: json:dumps
deserializer: json:loads
bridge:
  # MQTTtoROS
    # startpoint
  - factory: mqtt_bridge.bridge:MqttToRosBridge
    msg_type: geometry_msgs.msg:PoseStamped
    topic_from: startpoint
    topic_to: /startpoint
    # endpoint
  - factory: mqtt_bridge.bridge:MqttToRosBridge
    msg_type: geometry_msgs.msg:PoseStamped
    topic_from: endpoint
    topic_to: /endpoint
    #map
  - factory: mqtt_bridge.bridge:MqttToRosBridge
    msg_type: std_msgs.msg:String
    topic_from: maplink
    topic_to: /maplink
    #otherCar
  - factory: mqtt_bridge.bridge:MqttToRosBridge
    msg_type: std_msgs.msg:String
    topic_from: othercar
    topic_to: /othercar
    #light
  - factory: mqtt_bridge.bridge:MqttToRosBridge
    msg_type: std_msgs.msg:String
    topic_from: light
    topic_to: /light
  - factory: mqtt_bridge.bridge:MqttToRosBridge
    msg_type: geometry_msgs.msg:PoseStamped
    topic_from: car2point
    topic_to: /car2point   
  - factory: mqtt_bridge.bridge:MqttToRosBridge
    msg_type: geometry_msgs.msg:PoseStamped
    topic_from: car3point
    topic_to: /car3point  
  - factory: mqtt_bridge.bridge:MqttToRosBridge
    msg_type: geometry_msgs.msg:PoseStamped
    topic_from: car4point
    topic_to: /car4point   
    #launchsignal
  - factory: mqtt_bridge.bridge:MqttToRosBridge
    msg_type: std_msgs.msg:Bool
    topic_from: launchsignal
    topic_to: /launchsignal 
  ##############################################
  #ROStoMQTT
   #location
  - factory: mqtt_bridge.bridge:RosToMqttBridge
    msg_type: geometry_msgs.msg:PoseWithCovarianceStamped
    topic_from: /amcl_pose
    topic_to: location
   #pathset
  - factory: mqtt_bridge.bridge:RosToMqttBridge
    msg_type: nav_msgs.msg:Path
    #topic_from: /local_trajectory_path
    topic_from: /move_base/TebLocalPlannerROS/local_plan
    topic_to: localpathset
   #localpathset
  - factory: mqtt_bridge.bridge:RosToMqttBridge
    msg_type: nav_msgs.msg:Path
    #topic_from: /global_path
    topic_from: /move_base/TebLocalPlannerROS/global_plan
    topic_to: pathset
   #getready
  - factory: mqtt_bridge.bridge:RosToMqttBridge
    msg_type: std_msgs.msg:Bool
    topic_from: /getready
    topic_to: getready
  ############################################## 
  # ROStoMQTT
  # ping pong
  - factory: mqtt_bridge.bridge:RosToMqttBridge
    msg_type: std_msgs.msg:Bool
    topic_from: /ping
    topic_to: ping
  - factory: mqtt_bridge.bridge:MqttToRosBridge
    msg_type: std_msgs.msg:Bool
    topic_from: ping
    topic_to: /pong
  # echo back
  - factory: mqtt_bridge.bridge:RosToMqttBridge
    msg_type: std_msgs.msg:String
    topic_from: /echo
    topic_to: hyecho
  - factory: mqtt_bridge.bridge:MqttToRosBridge
    msg_type: std_msgs.msg:String
    topic_from: jxecho
    topic_to: /back
  - factory: mqtt_bridge.bridge:MqttToRosBridge
    #msg_type: geometry_msgs.msg:PoseStamped
    msg_type: std_msgs.msg:String
    topic_from: odomecho
    topic_to: /abc
  # private path
  - factory: mqtt_bridge.bridge:RosToMqttBridge
    msg_type: std_msgs.msg:String
    topic_from: /private/echo
    topic_to: ~/echo
  - factory: mqtt_bridge.bridge:MqttToRosBridge
    msg_type: std_msgs.msg:String
    topic_from: ~/echo
    topic_to: /private/back
